<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Repository architecture</title>
  <desc id="desc">A monorepo diagram showing the desktop app feeding the core package, which connects to SDK and shared packages, with providers behind the SDK.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12z" fill="#7dd3fc"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 24px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      .group { fill: #081120; stroke: #1e293b; stroke-width: 2; stroke-dasharray: 10 8; }
      .node { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 22; }
      .node-strong { fill: #10253c; stroke: #38bdf8; stroke-width: 2.5; rx: 22; }
      .edge { stroke: #7dd3fc; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .label { font-size: 20px; font-weight: 700; fill: #e2e8f0; text-anchor: middle; }
      .meta { font-size: 13px; fill: #94a3b8; text-anchor: middle; }
      .group-label { font-size: 14px; font-weight: 700; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <text x="56" y="44" class="title">Architecture</text>
  <text x="56" y="68" class="subtitle">The desktop app drives orchestration in core, core depends on the SDK and shared contracts, and the SDK reaches provider APIs.</text>

  <rect x="54" y="76" width="272" height="220" rx="26" class="group"/>
  <text x="78" y="102" class="group-label">Apps</text>

  <rect x="90" y="132" width="200" height="108" class="node"/>
  <text x="190" y="164" class="label">Desktop app</text>
  <text x="190" y="186" class="meta">apps/desktop</text>
  <text x="190" y="205" class="meta">Tauri v2 + React</text>

  <rect x="398" y="128" width="252" height="104" class="node-strong"/>
  <text x="524" y="160" class="label">@socratic-council/core</text>
  <text x="524" y="182" class="meta">bidding, conflict, cost, memory</text>
  <text x="524" y="201" class="meta">conversation orchestration</text>

  <rect x="736" y="82" width="252" height="94" class="node"/>
  <text x="862" y="112" class="label">@socratic-council/sdk</text>
  <text x="862" y="134" class="meta">providers, transport, streaming</text>

  <rect x="736" y="208" width="252" height="94" class="node"/>
  <text x="862" y="238" class="label">@socratic-council/shared</text>
  <text x="862" y="260" class="meta">types, constants, model registry</text>

  <rect x="1042" y="128" width="184" height="104" class="node"/>
  <text x="1134" y="160" class="label">Provider APIs</text>
  <text x="1134" y="182" class="meta">OpenAI, Anthropic, Google</text>
  <text x="1134" y="201" class="meta">DeepSeek, Kimi, Qwen, MiniMax</text>

  <path d="M290 186H398" class="edge"/>
  <path d="M650 178H736V129" class="edge"/>
  <path d="M650 182H736V255" class="edge"/>
  <path d="M988 129H1042" class="edge"/>
</svg>
