<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 270" role="img" aria-labelledby="title desc">
  <title id="title">Export pipeline</title>
  <desc id="desc">A diagram showing transcript data feeding statistics and conflict calculations, then entering the export renderer and writing files to disk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12z" fill="#7dd3fc"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 24px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      .node { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 22; }
      .node-strong { fill: #10253c; stroke: #38bdf8; stroke-width: 2.5; rx: 22; }
      .edge { stroke: #7dd3fc; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .label { font-size: 18px; font-weight: 700; fill: #e2e8f0; text-anchor: middle; }
      .meta { font-size: 12px; fill: #94a3b8; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1120" height="270" rx="28" fill="url(#bg)"/>
  <text x="56" y="44" class="title">Export Pipeline</text>
  <text x="56" y="68" class="subtitle">Everything stays local: transcript data and computed stats feed the export renderer, which writes files directly to disk.</text>

  <rect x="56" y="108" width="210" height="92" class="node"/>
  <text x="161" y="140" class="label">Transcript</text>
  <text x="161" y="162" class="meta">messages plus metadata</text>

  <rect x="350" y="64" width="220" height="82" class="node"/>
  <text x="460" y="94" class="label">Stats</text>
  <text x="460" y="116" class="meta">speaker counts and cost ledger</text>

  <rect x="350" y="162" width="220" height="82" class="node"/>
  <text x="460" y="192" class="label">Conflict graph</text>
  <text x="460" y="214" class="meta">pairwise disagreement scores</text>

  <rect x="662" y="108" width="252" height="92" class="node-strong"/>
  <text x="788" y="140" class="label">Export renderer</text>
  <text x="788" y="162" class="meta">Markdown / JSON / PDF / DOCX / PPTX</text>

  <rect x="974" y="108" width="92" height="92" class="node"/>
  <text x="1020" y="140" class="label">File</text>
  <text x="1020" y="162" class="meta">on disk</text>

  <path d="M266 154H350V105" class="edge"/>
  <path d="M266 154H350V203" class="edge"/>
  <path d="M570 105H662" class="edge"/>
  <path d="M570 203H662" class="edge"/>
  <path d="M914 154H974" class="edge"/>
</svg>
