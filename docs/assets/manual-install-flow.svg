<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" role="img" aria-labelledby="title desc">
  <title id="title">Manual install flow</title>
  <desc id="desc">A five-step flow for manual setup: prerequisites, Node.js and Corepack, Rust, pnpm install, then tauri dev or build.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12z" fill="#7dd3fc"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 24px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      .node { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 20; }
      .edge { stroke: #7dd3fc; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow); }
      .label { font-size: 16px; font-weight: 700; fill: #e2e8f0; text-anchor: middle; }
      .meta { font-size: 12px; fill: #94a3b8; text-anchor: middle; }
      .badge { fill: #10253c; stroke: #38bdf8; stroke-width: 2; }
      .badge-text { font-size: 12px; font-weight: 700; fill: #f8fafc; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1200" height="240" rx="28" fill="url(#bg)"/>
  <text x="56" y="44" class="title">Build from Source</text>
  <text x="56" y="68" class="subtitle">Manual install keeps the setup explicit: system dependencies first, workspace install second, app build last.</text>

  <rect x="52" y="110" width="180" height="74" class="node"/>
  <circle cx="78" cy="98" r="16" class="badge"/>
  <text x="78" y="98" class="badge-text">1</text>
  <text x="142" y="138" class="label">System prerequisites</text>
  <text x="142" y="160" class="meta">OS packages and WebView deps</text>

  <rect x="286" y="110" width="180" height="74" class="node"/>
  <circle cx="312" cy="98" r="16" class="badge"/>
  <text x="312" y="98" class="badge-text">2</text>
  <text x="376" y="138" class="label">Node.js + Corepack</text>
  <text x="376" y="160" class="meta">pin pnpm from packageManager</text>

  <rect x="520" y="110" width="180" height="74" class="node"/>
  <circle cx="546" cy="98" r="16" class="badge"/>
  <text x="546" y="98" class="badge-text">3</text>
  <text x="610" y="138" class="label">Rust toolchain</text>
  <text x="610" y="160" class="meta">stable compiler and cargo</text>

  <rect x="754" y="110" width="180" height="74" class="node"/>
  <circle cx="780" cy="98" r="16" class="badge"/>
  <text x="780" y="98" class="badge-text">4</text>
  <text x="844" y="138" class="label">pnpm install</text>
  <text x="844" y="160" class="meta">workspace dependencies</text>

  <rect x="988" y="110" width="160" height="74" class="node"/>
  <circle cx="1014" cy="98" r="16" class="badge"/>
  <text x="1014" y="98" class="badge-text">5</text>
  <text x="1068" y="138" class="label">tauri dev / build</text>
  <text x="1068" y="160" class="meta">run or bundle the desktop app</text>

  <path d="M232 147H286" class="edge"/>
  <path d="M466 147H520" class="edge"/>
  <path d="M700 147H754" class="edge"/>
  <path d="M934 147H988" class="edge"/>
</svg>
