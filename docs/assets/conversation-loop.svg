<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 460" role="img" aria-labelledby="title desc">
  <title id="title">Conversation loop</title>
  <desc id="desc">A runtime flow showing user input entering the chat UI, context building, bidding, streaming, parsing actions, then tool calls, costs, conflict tracking, and UI refresh.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12z" fill="#7dd3fc"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 24px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      .node { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 20; }
      .node-strong { fill: #10253c; stroke: #38bdf8; stroke-width: 2.5; rx: 20; }
      .edge { stroke: #7dd3fc; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .label { font-size: 16px; font-weight: 700; fill: #e2e8f0; text-anchor: middle; }
      .meta { font-size: 12px; fill: #94a3b8; text-anchor: middle; }
      .route { font-size: 12px; font-weight: 700; fill: #f8fafc; }
    </style>
  </defs>

  <rect width="1680" height="460" rx="28" fill="url(#bg)"/>
  <text x="56" y="44" class="title">Conversation Loop</text>
  <text x="56" y="68" class="subtitle">Each turn selects a speaker, streams an answer, parses structured actions, then folds tool output and analytics back into the UI.</text>

  <rect x="44" y="118" width="146" height="78" class="node"/>
  <text x="117" y="148" class="label">You</text>
  <text x="117" y="170" class="meta">topic / prompt</text>

  <rect x="240" y="118" width="170" height="78" class="node"/>
  <text x="325" y="148" class="label">Chat UI</text>
  <text x="325" y="170" class="meta">desktop transcript surface</text>

  <rect x="462" y="118" width="190" height="78" class="node"/>
  <text x="557" y="148" class="label">Build context</text>
  <text x="557" y="170" class="meta">sliding window plus memory</text>

  <rect x="706" y="118" width="170" height="78" class="node"/>
  <text x="791" y="148" class="label">Bidding round</text>
  <text x="791" y="170" class="meta">select next speaker</text>

  <rect x="930" y="118" width="190" height="78" class="node"/>
  <text x="1025" y="148" class="label">Provider streaming</text>
  <text x="1025" y="170" class="meta">agent response generation</text>

  <rect x="1174" y="118" width="188" height="78" class="node-strong"/>
  <text x="1268" y="148" class="label">Parse actions</text>
  <text x="1268" y="170" class="meta">@quote / @react / @tool</text>

  <rect x="1416" y="118" width="196" height="78" class="node"/>
  <text x="1514" y="148" class="label">Finalize message</text>
  <text x="1514" y="170" class="meta">store and render</text>

  <rect x="1030" y="294" width="190" height="78" class="node"/>
  <text x="1125" y="324" class="label">Oracle tool</text>
  <text x="1125" y="346" class="meta">search / verify / cite</text>

  <rect x="1270" y="294" width="214" height="78" class="node"/>
  <text x="1377" y="324" class="label">Tool result message</text>
  <text x="1377" y="346" class="meta">oracle.* results inserted</text>

  <rect x="1518" y="252" width="122" height="62" class="node"/>
  <text x="1579" y="279" class="label">Cost</text>
  <text x="1579" y="297" class="meta">tokens + USD</text>

  <rect x="1518" y="346" width="122" height="62" class="node"/>
  <text x="1579" y="373" class="label">Conflict</text>
  <text x="1579" y="391" class="meta">pairwise tension</text>

  <rect x="520" y="304" width="238" height="78" class="node"/>
  <text x="639" y="334" class="label">UI refresh and analytics</text>
  <text x="639" y="356" class="meta">updated transcript state</text>

  <path d="M190 157H240" class="edge"/>
  <path d="M410 157H462" class="edge"/>
  <path d="M652 157H706" class="edge"/>
  <path d="M876 157H930" class="edge"/>
  <path d="M1120 157H1174" class="edge"/>
  <path d="M1362 157H1416" class="edge"/>

  <path d="M1268 196V245H1125V294" class="edge"/>
  <path d="M1220 333H1270" class="edge"/>
  <path d="M1514 196V252" class="edge"/>
  <path d="M1514 196V377H1518" class="edge"/>

  <path d="M1270 333H940V343H758" class="edge"/>
  <path d="M1518 283H860V343H758" class="edge"/>
  <path d="M1518 377H860V343H758" class="edge"/>
  <path d="M520 343H325V196" class="edge"/>

  <text x="1200" y="240" class="route">tool call</text>
</svg>
