<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Installation paths</title>
  <desc id="desc">A diagram showing the quick install path through install.sh and the manual build-from-source path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12z" fill="#7dd3fc"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 24px; font-weight: 700; fill: #f8fafc; }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      .node { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 22; }
      .node-strong { fill: #10253c; stroke: #38bdf8; stroke-width: 2.5; rx: 22; }
      .decision { fill: #10253c; stroke: #f59e0b; stroke-width: 2.5; }
      .edge { stroke: #7dd3fc; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; marker-end: url(#arrow); }
      .label { font-size: 18px; font-weight: 700; fill: #e2e8f0; text-anchor: middle; }
      .meta { font-size: 13px; fill: #94a3b8; text-anchor: middle; }
      .route { font-size: 13px; font-weight: 700; fill: #f8fafc; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="28" fill="url(#bg)"/>
  <text x="56" y="44" class="title">Installation Paths</text>
  <text x="56" y="68" class="subtitle">Quick install is the fastest macOS path. Manual install is the source-of-truth setup guide.</text>

  <rect x="70" y="116" width="190" height="72" class="node"/>
  <text x="165" y="144" class="label">Choose a path</text>
  <text x="165" y="166" class="meta">start here</text>

  <polygon points="470,90 590,152 470,214 350,152" class="decision"/>
  <text x="470" y="144" class="label">macOS and want</text>
  <text x="470" y="166" class="meta">one command?</text>

  <rect x="680" y="54" width="190" height="72" class="node-strong"/>
  <text x="775" y="82" class="label">Run install.sh</text>
  <text x="775" y="104" class="meta">quick install script</text>

  <rect x="650" y="190" width="250" height="72" class="node"/>
  <text x="775" y="218" class="label">Follow the manual guide</text>
  <text x="775" y="240" class="meta">full prerequisites and build steps</text>

  <rect x="970" y="54" width="168" height="72" class="node"/>
  <text x="1054" y="82" class="label">App in</text>
  <text x="1054" y="104" class="meta">/Applications</text>

  <rect x="970" y="190" width="168" height="72" class="node"/>
  <text x="1054" y="218" class="label">Build from</text>
  <text x="1054" y="240" class="meta">source locally</text>

  <path d="M260 152H350" class="edge"/>
  <path d="M590 152H630V90H680" class="edge"/>
  <path d="M590 152H620V226H650" class="edge"/>
  <path d="M870 90H970" class="edge"/>
  <path d="M900 226H970" class="edge"/>

  <text x="620" y="86" class="route">Yes</text>
  <text x="610" y="222" class="route">No</text>
</svg>
